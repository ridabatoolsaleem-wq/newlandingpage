<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title }} | Rida Batool Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #eef4fb;
      --surface: #ffffff;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text-dark: #0f172a;
      --text-mid: #334155;
      --text-soft: #64748b;
      --tag-bg: #e0eaff;
      --tag-color: #2563eb;
      --tag2-bg: #e0f5ee;
      --tag2-color: #0d7a55;
      --tag3-bg: #fef3c7;
      --tag3-color: #b45309;
      --border: #dde8f5;
      --ghost-bg: #dde8f5;
      --ghost-hover: #c7d9f0;
      --radius: 14px;
    }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text-dark); min-height: 100vh; }

    /* ── NAV ── */
    nav {
      height: 56px; background: #fff8f0; border-bottom: 1px solid #f0e8dc;
      display: flex; align-items: center; padding: 0 2rem;
      position: sticky; top: 0; z-index: 100;
    }
    .brand { font-weight: 600; font-size: .95rem; color: var(--text-dark); text-decoration: none; }
    .nav-links { margin-left: auto; display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-size: .85rem; color: var(--text-mid); text-decoration: none; font-weight: 500; transition: color .2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); font-weight: 700; }

    /* ── MAIN ── */
    main { max-width: 960px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

    /* ── HERO ── */
    .hero { margin-bottom: 4rem; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; line-height: 1.15; margin-bottom: 1rem; }
    .hero p { font-size: 1rem; color: var(--text-mid); max-width: 560px; line-height: 1.7; margin-bottom: 1.8rem; }
    .hero-btns { display: flex; gap: .75rem; flex-wrap: wrap; }
    .btn-primary {
      background: var(--accent); color: #fff; border: none; padding: .65rem 1.4rem;
      border-radius: 10px; font-size: .9rem; font-weight: 600; cursor: pointer;
      text-decoration: none; font-family: 'Sora', sans-serif; transition: background .2s, transform .15s;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-ghost {
      background: var(--ghost-bg); color: var(--text-dark); border: none; padding: .65rem 1.4rem;
      border-radius: 10px; font-size: .9rem; font-weight: 600; cursor: pointer;
      text-decoration: none; font-family: 'Sora', sans-serif; transition: background .2s;
    }
    .btn-ghost:hover { background: var(--ghost-hover); }

    /* ── SECTION HEADING ── */
    .section-heading { margin-bottom: 2rem; }
    .section-heading h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: .3rem; }
    .section-heading p { font-size: .9rem; color: var(--text-soft); }

    /* ── ARTICLE CARD ── */
    .article-card {
      background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
      display: grid; grid-template-columns: 180px 1fr; overflow: hidden;
      margin-bottom: 1.25rem; transition: box-shadow .2s, transform .2s;
      text-decoration: none; color: inherit;
    }
    .article-card:hover { box-shadow: 0 6px 24px rgba(37,99,235,.08); transform: translateY(-2px); }
    .article-card .thumb { width: 180px; height: 160px; object-fit: cover; display: block; background: #c8d8ee; }
    .card-body { padding: 1.1rem 1.4rem; display: flex; flex-direction: column; justify-content: space-between; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
    .tag { border-radius: 20px; font-size: .75rem; font-weight: 600; padding: .25rem .75rem; white-space: nowrap; }
    .tag-lab { background: var(--tag-bg); color: var(--tag-color); }
    .tag-css { background: var(--tag2-bg); color: var(--tag2-color); }
    .tag-js  { background: var(--tag3-bg); color: var(--tag3-color); }
    .date { font-size: .8rem; color: var(--text-soft); white-space: nowrap; }
    .card-title { font-size: 1.05rem; font-weight: 700; margin: .6rem 0 .4rem; color: var(--text-dark); }
    .card-desc { font-size: .875rem; color: var(--text-mid); line-height: 1.6; flex: 1; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: .8rem; }
    .read-time { font-size: .8rem; color: var(--text-soft); }
    .btn-read-more {
      background: var(--ghost-bg); color: var(--text-dark); border: none;
      padding: .4rem 1rem; border-radius: 8px; font-size: .8rem; font-weight: 600;
      cursor: pointer; text-decoration: none; font-family: 'Sora', sans-serif; transition: background .2s;
    }
    .btn-read-more:hover { background: var(--ghost-hover); }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 2.5rem; }
    .page-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: .4rem; }
    .page-header p { font-size: .95rem; color: var(--text-soft); }

    /* ── ABOUT ── */
    .about-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem; flex-wrap: wrap; }
    .avatar {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, #bfdbfe, #93c5fd);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .about-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: .3rem; }
    .about-header .subtitle { font-size: .95rem; color: var(--text-soft); }
    .section { margin-bottom: 2.5rem; }
    .section h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 2px solid var(--border); }
    .section p { font-size: .95rem; color: var(--text-mid); line-height: 1.8; margin-bottom: .8rem; }
    .skills-grid { display: flex; flex-wrap: wrap; gap: .5rem; }
    .skill-pill { background: var(--ghost-bg); color: var(--text-dark); border-radius: 20px; padding: .3rem .9rem; font-size: .8rem; font-weight: 600; }
    .skill-pill.accent { background: var(--tag-bg); color: var(--accent); }
    .timeline { list-style: none; }
    .timeline li { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: flex-start; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: .35rem; }
    .timeline-content strong { font-size: .9rem; font-weight: 700; display: block; }
    .timeline-content span { font-size: .82rem; color: var(--text-soft); }

    /* ── FILTERS ── */
    .filters { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .filter-btn {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px;
      padding: .3rem .9rem; font-size: .8rem; font-weight: 600; cursor: pointer;
      font-family: 'Sora', sans-serif; color: var(--text-mid); transition: all .2s;
    }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── CONTACT ── */
    .info-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .info-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .9rem 1.2rem; flex: 1; min-width: 140px; }
    .info-item .label { font-size: .72rem; color: var(--text-soft); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .2rem; }
    .info-item .value { font-size: .9rem; font-weight: 600; }
    .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: .875rem; font-weight: 600; margin-bottom: .4rem; }
    .form-group input, .form-group textarea {
      width: 100%; padding: .65rem 1rem; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Sora', sans-serif; font-size: .9rem; background: #fff; color: var(--text-dark);
      transition: border-color .2s; outline: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 140px; }
    .success-msg { display: none; background: #e0f5ee; color: #0d7a55; border-radius: 10px; padding: 1rem 1.2rem; margin-top: 1rem; font-size: .9rem; font-weight: 600; }

    /* ── FOOTER ── */
    footer { text-align: center; font-size: .8rem; color: var(--text-soft); padding: 2rem; border-top: 1px solid var(--border); }

    @media (max-width: 600px) {
      .article-card { grid-template-columns: 1fr; }
      .article-card .thumb { width: 100%; height: 180px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="{{ '/' | relative_url }}">Rida Batool Blog</a>
  <ul class="nav-links">
    <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
    <li><a href="{{ '/blog' | relative_url }}" {% if page.url contains 'blog' %}class="active"{% endif %}>Blog</a></li>
    <li><a href="{{ '/about' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a></li>
    <li><a href="{{ '/contact' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a></li>
  </ul>
</nav>

<main>
  {{ content }}
</main>

<footer>© 2026 Rida Batool · Frontend Practice Journal</footer>

</body>
</html>
